[tox]
envlist = py309, py310, py312, optional, docs
skip_missing_interpreters = true
isolated_build = true

[testenv]
description = Run test suite with project dependency constraints
deps =
    -r requirements.txt
    pytest
commands =
    python -m pytest

[testenv:optional]
description = Run test suite with core and optional dependencies
skip_install = true
deps =
    -r requirements.txt
    -r requirements-optional.txt
    pytest
commands =
    python -m pytest

[testenv:docs]
description = Build Sphinx documentation
skip_install = true
deps =
    -r requirements.txt
    -r requirements-docs.txt
commands =
    python -m sphinx -b html docs docs/_build/html

